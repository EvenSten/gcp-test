server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy Yahoo Finance requests server-side (avoids CORS proxy reliance)
    location /yf-proxy/ {
        resolver 8.8.8.8 valid=30s;
        proxy_pass https://query1.finance.yahoo.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host query1.finance.yahoo.com;
        proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36";
        proxy_set_header Accept "*/*";
        proxy_set_header Accept-Language "en-US,en;q=0.9";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin * always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
